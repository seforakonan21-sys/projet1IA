<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Séfora Konan — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Source Serif 4", Georgia, serif;
      background-color: #faf6f0;
      color: #2c2416;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .hero {
      text-align: center;
      max-width: 640px;
    }

    .hero h1 {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 48px;
      font-weight: 700;
      color: #2c2416;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .hero p {
      margin-top: 24px;
      font-size: 18px;
      line-height: 1.6;
      color: #7a6b5a;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 40px;
      background-color: #8b6f47;
      color: #ffffff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 16px 32px;
      border-radius: 9999px;
      box-shadow: 0 10px 25px rgba(139, 111, 71, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      border: none;
    }

    .hero .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 35px rgba(139, 111, 71, 0.4);
    }

    .hero .btn svg {
      width: 18px;
      height: 18px;
    }

    @media (min-width: 640px) {
      .hero h1 { font-size: 60px; }
      .hero p  { font-size: 20px; }
    }

    @media (min-width: 768px) {
      .hero h1 { font-size: 72px; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Séfora Konan</h1>
    <p>Je suis une étudiante passionné par le développement web</p>
    <a href="#projets" class="btn">
      Voir mes projets
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14" />
        <path d="m12 5 7 7-7 7" />
      </svg>
    </a>
  </section>
</body>
</html>
